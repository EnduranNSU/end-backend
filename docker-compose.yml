services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - enduran
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  training:
    build:
      context: ./training
      dockerfile: Dockerfile
    volumes:
      - ./training/config/config.yaml:/app/config/config.yaml
    ports:
      - "8080:8080"
    networks:
      - enduran
    depends_on:
      postgres:
        condition: service_healthy

networks:
  enduran:
    driver: bridge